[plugin]
name         = "zigbee2mqtt"
version      = "0.2.1"
description  = "Connects to Zigbee2MQTT via MQTT, providing real-time device state and command dispatch."
api_version  = "0.1.0"
adapter_type = "ipc"
binary       = "zigbee2mqtt-adapter"

# ── CLI configuration prompts ─────────────────────────────────────────────────
# The [plugin] section above is read by the IPC host.
# The [[config.fields]] sections below are used only by `homecmdr plugin add`
# to prompt the user for adapter config values; the host ignores them.

[[config.fields]]
key         = "mqtt_host"
type        = "string"
description = "MQTT broker hostname or IP address"
default     = "127.0.0.1"
required    = false
optional    = false
secret      = false

[[config.fields]]
key         = "mqtt_port"
type        = "u64"
description = "MQTT broker port"
default     = "1883"
required    = false
optional    = false
secret      = false

[[config.fields]]
key         = "mqtt_username"
type        = "string"
description = "MQTT username (leave blank if broker requires no auth)"
required    = false
optional    = true
secret      = false

[[config.fields]]
key         = "mqtt_password"
type        = "string"
description = "MQTT password"
required    = false
optional    = true
secret      = true

[[config.fields]]
key         = "base_topic"
type        = "string"
description = "Zigbee2MQTT base MQTT topic"
default     = "zigbee2mqtt"
required    = false
optional    = false
secret      = false
