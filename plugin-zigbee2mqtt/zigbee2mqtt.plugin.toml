[plugin]
name        = "zigbee2mqtt"
version     = "0.1.0"
description = "Polls Zigbee2MQTT for device state via the built-in HTTP API."
api_version = "0.1.0"

[runtime]
poll_interval_secs = 30

# ── CLI configuration prompts ─────────────────────────────────────────────────
# The [plugin] and [runtime] sections above are read by the WASM host.
# The [[config.fields]] sections below are used only by `homecmdr plugin add`
# to prompt the user for adapter config values; the host ignores them.

[[config.fields]]
key         = "base_url"
type        = "string"
description = "Base URL of the Zigbee2MQTT frontend"
default     = "http://127.0.0.1:8080"
required    = false
optional    = false
secret      = false
