[plugin]
# TODO: set the canonical plugin name.  Must match [adapters.<name>] in config
#       and the prefix of all device IDs reported by this adapter.
name         = "my_plugin"
version      = "0.1.0"
description  = "TODO: one-line description of what this IPC adapter does."
api_version  = "0.1.0"
adapter_type = "ipc"
# TODO: rename to match the [[bin]] name in Cargo.toml.
binary       = "my-plugin-adapter"

# ── CLI configuration prompts ─────────────────────────────────────────────────
# [[config.fields]] entries are used by `homecmdr plugin add` to prompt the
# user for adapter config values.  The runtime host ignores them — only the
# JSON blob it passes in HOMECMDR_ADAPTER_CONFIG matters.
#
# Supported field types: "string" | "u64" | "bool"
# secret = true  → value is masked in the terminal during prompts
# optional = true → field is skipped when the user leaves it blank

[[config.fields]]
key         = "base_url"
type        = "string"
description = "Base URL of the device or service, e.g. http://192.168.1.100:8080"
required    = true
optional    = false
secret      = false

# TODO: add more fields as needed.  Example of an optional secret:
#
# [[config.fields]]
# key         = "api_key"
# type        = "string"
# description = "API key for the service (leave blank if not required)"
# required    = false
# optional    = true
# secret      = true
