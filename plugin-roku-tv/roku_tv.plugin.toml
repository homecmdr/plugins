[plugin]
name        = "roku_tv"
version     = "0.1.0"
description = "Polls Roku streaming devices and Roku TVs via the External Control Protocol (ECP)."
api_version = "0.1.0"

[runtime]
poll_interval_secs = 15

# ── CLI configuration prompts ─────────────────────────────────────────────────
# The [plugin] and [runtime] sections above are read by the WASM host.
# The [[config.fields]] sections below are used only by `homecmdr plugin add`
# to prompt the user for adapter config values; the host ignores them.

[[config.fields]]
key         = "base_url"
type        = "string"
description = "Base URL of the Roku device (e.g. http://192.168.1.100:8060)"
default     = ""
required    = true
optional    = false
secret      = false
