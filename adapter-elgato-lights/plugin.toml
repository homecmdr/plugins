[config]
block = "adapters.elgato_lights"

[[config.fields]]
key = "enabled"
type = "bool"
description = "Enable or disable this plugin"
default = "true"

[[config.fields]]
key = "base_url"
type = "string"
description = "Base URL of the Elgato Control Center companion app"
default = "http://127.0.0.1:9123"

[[config.fields]]
key = "poll_interval_secs"
type = "u64"
description = "How often to poll for device state changes (seconds, minimum 1)"
default = "30"
