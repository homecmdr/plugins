[config]
block = "adapters.zigbee2mqtt"

[[config.fields]]
key = "enabled"
type = "bool"
description = "Enable or disable this plugin"
default = "true"

[[config.fields]]
key = "server"
type = "string"
description = "MQTT broker URL (e.g. mqtt://127.0.0.1:1883)"
required = true

[[config.fields]]
key = "base_topic"
type = "string"
description = "Zigbee2MQTT base topic"
default = "zigbee2mqtt"

[[config.fields]]
key = "client_id"
type = "string"
description = "MQTT client ID"
default = "homecmdr-zigbee2mqtt"

[[config.fields]]
key = "username"
type = "string"
description = "MQTT username (leave blank if authentication is not required)"
optional = true

[[config.fields]]
key = "password"
type = "string"
description = "MQTT password (leave blank if authentication is not required)"
optional = true
secret = true

[[config.fields]]
key = "keepalive_secs"
type = "u64"
description = "MQTT keepalive interval (seconds)"
default = "30"

[[config.fields]]
key = "command_timeout_secs"
type = "u64"
description = "Timeout waiting for a device command to complete (seconds)"
default = "5"
